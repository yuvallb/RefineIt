<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/TransformStudio/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transform Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA route restoration (see public/404.html) -->
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          var decoded = location.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            location.pathname.slice(0, -1) + decoded + location.hash,
          );
        }
      })(window.location);
    </script>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
